    function setCookie(name, value, days) {
        var expires = '';
        if (days) {
            var date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            expires = '; expires=' + date.toGMTString();
        }
        document.cookie = name + '=' + value + expires + '; path=/';
    }
    
    function getCookie(name) {
        var nameEQ = name + '=';
        var ca = document.cookie.split(';');
        for (var i = 0; i < ca.length; i++) {
            var c = ca[i];
            while (c.charAt(0) === ' ') c = c.substring(1, c.length);
            if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
        }
        return null;
    }

            document.getElementById('loginPage').style.display = 'none';

        init();

    // 三角形突围游戏
    function initTriangle(canvas, ctx) {
        var player = {x: 400, y: 500, size: 20, angle: -Math.PI/2};
        var rays = [];
        var score = 0;
        var gameOver = false;
        var keys = {};
        
        function drawTriangle(x, y, size, angle, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x + Math.cos(angle) * size, y + Math.sin(angle) * size);
            ctx.lineTo(x + Math.cos(angle + 2.4) * size, y + Math.sin(angle + 2.4) * size);
            ctx.lineTo(x + Math.cos(angle - 2.4) * size, y + Math.sin(angle - 2.4) * size);
            ctx.closePath();
            ctx.fill();
        }
        
        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, 800, 600);
            
            rays.forEach(function(r) {
                ctx.strokeStyle = r.color;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(400, 300);
                var endX = 400 + Math.cos(r.angle) * r.length;
                var endY = 300 + Math.sin(r.angle) * r.length;
                ctx.lineTo(endX, endY);
                ctx.stroke();
            });
            
            drawTriangle(player.x, player.y, player.size, player.angle, '#4ecca3');
            drawTriangle(player.x, player.y, player.size - 5, player.angle + 0.3, '#2d8a4e');
            
            ctx.fillStyle = '#fff';
            ctx.font = '20px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('分数: ' + score + ' | 方向键移动', 10, 30);
            
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, 800, 600);
                ctx.fillStyle = '#e94560';
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('被射线击中!', 400, 280);
                ctx.fillStyle = '#fff';
                ctx.font = '20px Arial';
                ctx.fillText('得分: ' + score + ' 按R重新开始', 400, 340);
            }
        }
        
        function update() {
            if (gameOver) return;
            
            if (keys[37] && player.x > 20) player.x -= 5;
            if (keys[39] && player.x < 780) player.x += 5;
            if (keys[38] && player.y > 20) player.y -= 5;
            if (keys[40] && player.y < 580) player.y += 5;
            
            player.angle += 0.05;
            
            if (Math.random() < 0.03) {
                rays.push({angle: Math.random() * Math.PI * 2, length: 350, color: '#e94560'});
            }
            
            for (var i = 0; i < rays.length; i++) {
                rays[i].length -= 2;
                if (rays[i].length < 0) {
                    rays.splice(i, 1);
                    i--;
                    score += 10;
                }
            }
            
            rays.forEach(function(r) {
                var rx = 400 + Math.cos(r.angle) * r.length;
                var ry = 300 + Math.sin(r.angle) * r.length;
                var dx = player.x - rx;
                var dy = player.y - ry;
                if (Math.sqrt(dx*dx + dy*dy) < player.size + 5) {
                    gameOver = true;
                }
            });
            
            draw();
        }
        
        function reset() {
            player = {x: 400, y: 500, size: 20, angle: -Math.PI/2};
            rays = [];
            score = 0;
            gameOver = false;
            keys = {};
        }
        
        document.onkeydown = function(e) {
            keys[e.keyCode] = true;
            if (e.keyCode === 82) reset();
        };
        document.onkeyup = function(e) {
            keys[e.keyCode] = false;
        };
        
        reset();
        setInterval(update, 30);
    }
    
    // 金字塔爬升游戏
    function initPyramid(canvas, ctx) {
        var player = {x: 400, y: 550, vy: 0};
        var platforms = [];
        var score = 0;
        var gameOver = false;
        var keys = {};
        
        function initPlatforms() {
            platforms = [];
            for (var i = 0; i < 10; i++) {
                platforms.push({
                    x: Math.random() * 700,
                    y: 500 - i * 55,
                    w: 60 + Math.random() * 40,
                    h: 15
                });
            }
        }
        
        function drawTriangle(x, y, size, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y - size);
            ctx.lineTo(x - size * 0.8, y + size);
            ctx.lineTo(x + size * 0.8, y + size);
            ctx.closePath();
            ctx.fill();
        }
        
        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, 800, 600);
            
            ctx.fillStyle = '#ffd700';
            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('金字塔', 400, 40);
            
            platforms.forEach(function(p) {
                ctx.fillStyle = '#533483';
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.strokeStyle = '#e94560';
                ctx.lineWidth = 2;
                ctx.strokeRect(p.x, p.y, p.w, p.h);
            });
            
            drawTriangle(player.x, player.y, 15, '#4ecca3');
            
            ctx.fillStyle = '#fff';
            ctx.font = '18px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('分数: ' + score + ' | 空格跳跃 ←→移动', 10, 580);
            
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, 800, 600);
                ctx.fillStyle = '#e94560';
                ctx.font = '40px Arial';
                ctx.fillText('掉下去了!', 400, 280);
                ctx.fillStyle = '#fff';
                ctx.font = '20px Arial';
                ctx.fillText('按R重新开始', 400, 340);
            }
        }
        
        function update() {
            if (gameOver) return;
            
            if (keys[37] && player.x > 10) player.x -= 4;
            if (keys[39] && player.x < 790) player.x += 4;
            
            if ((keys[32] || keys[38]) && player.vy === 0) {
                player.vy = -12;
            }
            
            player.vy += 0.5;
            player.y += player.vy;
            
            platforms.forEach(function(p) {
                if (player.x > p.x && player.x < p.x + p.w &&
                    player.y + 15 > p.y && player.y + 15 < p.y + p.h + 10 &&
                    player.vy >= 0) {
                    player.y = p.y - 15;
                    player.vy = 0;
                }
            });
            
            if (player.y > 600) {
                gameOver = true;
            }
            
            platforms.forEach(function(p) {
                p.y += 1;
                if (p.y > 600) {
                    p.y = -20;
                    p.x = Math.random() * 700;
                    p.w = 60 + Math.random() * 40;
                    score += 10;
                }
            });
            
            draw();
        }
        
        function reset() {
            player = {x: 400, y: 550, vy: 0};
            initPlatforms();
            score = 0;
            gameOver = false;
            keys = {};
        }
        
        document.onkeydown = function(e) {
            keys[e.keyCode] = true;
            if (e.keyCode === 82) reset();
        };
        document.onkeyup = function(e) {
            keys[e.keyCode] = false;
        };
        
        reset();
        setInterval(update, 30);
    }
    
    // 三角漩涡游戏
    function initVortex(canvas, ctx) {
        var player = {x: 400, y: 300, angle: 0, dist: 100};
        var enemies = [];
        var score = 0;
        var gameOver = false;
        
        function drawTriangle(x, y, size, angle, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x + Math.cos(angle) * size, y + Math.sin(angle) * size);
            ctx.lineTo(x + Math.cos(angle + 2.4) * size, y + Math.sin(angle + 2.4) * size);
            ctx.lineTo(x + Math.cos(angle - 2.4) * size, y + Math.sin(angle - 2.4) * size);
            ctx.closePath();
            ctx.fill();
        }
        
        function draw() {
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, 800, 600);
            
            ctx.strokeStyle = '#533483';
            ctx.lineWidth = 3;
            for (var i = 0; i < 10; i++) {
                ctx.beginPath();
                ctx.arc(400, 300, 30 + i * 25, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            enemies.forEach(function(e) {
                drawTriangle(e.x, e.y, e.size, e.angle, '#e94560');
            });
            
            drawTriangle(player.x, player.y, 18, player.angle, '#4ecca3');
            
            ctx.fillStyle = '#fff';
            ctx.font = '20px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('分数: ' + score + ' | 鼠标控制', 10, 30);
            
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, 800, 600);
                ctx.fillStyle = '#e94560';
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('游戏结束!', 400, 280);
                ctx.fillStyle = '#fff';
                ctx.font = '20px Arial';
                ctx.fillText('得分: ' + score + ' 点击重新开始', 400, 340);
            }
        }
        
        function update() {
            if (gameOver) return;
            
            player.angle += 0.03;
            player.dist = Math.max(50, Math.min(250, player.dist));
            player.x = 400 + Math.cos(player.angle) * player.dist;
            player.y = 300 + Math.sin(player.angle) * player.dist;
            
            if (Math.random() < 0.05) {
                var spawnAngle = Math.random() * Math.PI * 2;
                enemies.push({
                    x: 400 + Math.cos(spawnAngle) * 280,
                    y: 300 + Math.sin(spawnAngle) * 280,
                    angle: spawnAngle + Math.PI,
                    size: 12,
                    speed: 2 + Math.random() * 2
                });
            }
            
            enemies.forEach(function(e, i) {
                var dx = 400 - e.x;
                var dy = 300 - e.y;
                var dist = Math.sqrt(dx*dx + dy*dy);
                e.x += (dx / dist) * e.speed;
                e.y += (dy / dist) * e.speed;
                e.angle += 0.1;
                
                if (dist < 30) {
                    enemies.splice(i, 1);
                    score += 10;
                }
                
                var pdx = player.x - e.x;
                var pdy = player.y - e.y;
                if (Math.sqrt(pdx*pdx + pdy*pdy) < 25) {
                    gameOver = true;
                }
            });
            
            draw();
        }
        
        canvas.onmousemove = function(e) {
            var rect = canvas.getBoundingClientRect();
            var mx = e.clientX - rect.left;
            var my = e.clientY - rect.top;
            var dx = mx - 400;
            var dy = my - 300;
            player.dist = Math.sqrt(dx*dx + dy*dy);
            player.angle = Math.atan2(dy, dx);
        };
        
        canvas.onclick = function() {
            if (gameOver) {
                enemies = [];
                score = 0;
                player = {x: 400, y: 300, angle: 0, dist: 100};
                gameOver = false;
            }
        };
        
        setInterval(update, 30);
    }
    
    // 三角陨石游戏
    function initAsteroid(canvas, ctx) {
        var player = {x: 400, y: 550, angle: -Math.PI/2};
        var asteroids = [];
        var bullets = [];
        var score = 0;
        var gameOver = false;
        var keys = {};
        
        function drawTriangle(x, y, size, angle, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x + Math.cos(angle) * size, y + Math.sin(angle) * size);
            ctx.lineTo(x + Math.cos(angle + 2.4) * size, y + Math.sin(angle + 2.4) * size);
            ctx.lineTo(x + Math.cos(angle - 2.4) * size, y + Math.sin(angle - 2.4) * size);
            ctx.closePath();
            ctx.fill();
        }
        
        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, 800, 600);
            
            bullets.forEach(function(b) {
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            
            asteroids.forEach(function(a) {
                drawTriangle(a.x, a.y, a.size, a.angle, '#e94560');
            });
            
            drawTriangle(player.x, player.y, 15, player.angle, '#4ecca3');
            
            ctx.fillStyle = '#fff';
            ctx.font = '20px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('分数: ' + score + ' | ←→移动 空格射击', 10, 30);
            
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, 800, 600);
                ctx.fillStyle = '#e94560';
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('被陨石击中!', 400, 280);
                ctx.fillStyle = '#fff';
                ctx.font = '20px Arial';
                ctx.fillText('按R重新开始', 400, 340);
            }
        }
        
        function update() {
            if (gameOver) return;
            
            if (keys[37] && player.x > 20) player.x -= 5;
            if (keys[39] && player.x < 780) player.x += 5;
            
            player.angle = -Math.PI / 2;
            
            bullets.forEach(function(b, i) {
                b.y -= 8;
                if (b.y < 0) bullets.splice(i, 1);
            });
            
            if (Math.random() < 0.03) {
                asteroids.push({
                    x: Math.random() * 780 + 10,
                    y: -30,
                    size: 15 + Math.random() * 20,
                    angle: Math.PI / 2,
                    speed: 2 + Math.random() * 3
                });
            }
            
            asteroids.forEach(function(a, i) {
                a.y += a.speed;
                a.angle += 0.05;
                
                if (a.y > 630) {
                    asteroids.splice(i, 1);
                }
                
                bullets.forEach(function(b, j) {
                    var dx = b.x - a.x;
                    var dy = b.y - a.y;
                    if (Math.sqrt(dx*dx + dy*dy) < a.size + 5) {
                        asteroids.splice(i, 1);
                        bullets.splice(j, 1);
                        score += 20;
                    }
                });
                
                var pdx = player.x - a.x;
                var pdy = player.y - a.y;
                if (Math.sqrt(pdx*pdx + pdy*pdy) < a.size + 15) {
                    gameOver = true;
                }
            });
            
            draw();
        }
        
        function reset() {
            player = {x: 400, y: 550, angle: -Math.PI/2};
            asteroids = [];
            bullets = [];
            score = 0;
            gameOver = false;
            keys = {};
        }
        
        document.onkeydown = function(e) {
            keys[e.keyCode] = true;
            if (e.keyCode === 32) bullets.push({x: player.x, y: player.y});
            if (e.keyCode === 82) reset();
        };
        document.onkeyup = function(e) {
            keys[e.keyCode] = false;
        };
        
        reset();
        setInterval(update, 30);
    }
    
    // 扫雷游戏 - 修复版本
    function initMine(canvas, ctx) {
        var rows = 16, cols = 16, mines = 40, grid = [], revealed = [], over = false, won = false, flags = 0;
        
        function init() { grid = []; revealed = []; over = false; won = false; flags = 0; for (var i = 0; i < rows; i++) { grid[i] = []; revealed[i] = []; for (var j = 0; j < cols; j++) { grid[i][j] = 0; revealed[i][j] = false; } } var p = 0; while (p < mines) { var r = Math.floor(Math.random() * rows), c = Math.floor(Math.random() * cols); if (grid[r][c] !== -1) { grid[r][c] = -1; p++; } } for (var i = 0; i < rows; i++) for (var j = 0; j < cols; j++) if (grid[i][j] !== -1) { var c = 0; for (var di = -1; di <= 1; di++) for (var dj = -1; dj <= 1; dj++) { var ni = i + di, nj = j + dj; if (ni >= 0 && ni < rows && nj >= 0 && nj < cols && grid[ni][nj] === -1) c++; } grid[i][j] = c; } draw(); }
        
        function draw() { ctx.fillStyle = '#16213e'; ctx.fillRect(0, 0, 640, 520); var cs = 32, sx = 32, sy = 32; for (var i = 0; i < rows; i++) for (var j = 0; j < cols; j++) { var x = sx + j * cs, y = sy + i * cs; if (revealed[i][j]) { ctx.fillStyle = grid[i][j] === -1 ? '#e94560' : '#0f3460'; ctx.fillRect(x, y, cs, cs); if (grid[i][j] === -1) { ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('💣', x + cs / 2, y + cs / 2); } else if (grid[i][j] > 0) { ctx.fillStyle = ['#fff', '#3498db', '#2ecc71', '#e74c3c', '#9b59b6', '#f39c12'][grid[i][j]]; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(grid[i][j], x + cs / 2, y + cs / 2); } } else { ctx.fillStyle = '#4ecca3'; ctx.fillRect(x, y, cs, cs); ctx.fillStyle = '#2d8a4e'; ctx.fillRect(x + 2, y + 2, cs - 4, cs - 4); } } var c = 0; for (var i = 0; i < rows; i++) for (var j = 0; j < cols; j++) if (revealed[i][j] && grid[i][j] === -1) c++; ctx.fillStyle = '#fff'; ctx.font = '16px Arial'; ctx.textAlign = 'left'; ctx.fillText('扫雷 | 左键翻开 右键标记 | 剩余:' + (mines - flags), 10, 500); if (c > 0) { ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, 640, 480); ctx.fillStyle = '#e94560'; ctx.font = '35px Arial'; ctx.textAlign = 'center'; ctx.fillText('踩到地雷!', 320, 230); ctx.fillStyle = '#fff'; ctx.font = '20px Arial'; ctx.fillText('按R重新开始', 320, 280); } var unrevealed = 0; for (var i = 0; i < rows; i++) for (var j = 0; j < cols; j++) if (!revealed[i][j] && grid[i][j] !== -1) unrevealed++; if (unrevealed === 0 && !over) { won = true; ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, 640, 480); ctx.fillStyle = '#4ecca3'; ctx.font = '35px Arial'; ctx.textAlign = 'center'; ctx.fillText('通关!', 320, 230); } }
        
        canvas.onclick = function(e) { if (over || won) return; var rect = canvas.getBoundingClientRect(); var x = e.clientX - rect.left, y = e.clientY - rect.top; var col = Math.floor((x - 32) / 32), row = Math.floor((y - 32) / 32); if (row >= 0 && row < rows && col >= 0 && col < cols && !revealed[row][col]) { revealed[row][col] = true; if (grid[row][col] === -1) over = true; draw(); } };
        canvas.oncontextmenu = function(e) { e.preventDefault(); if (over || won) return; var rect = canvas.getBoundingClientRect(); var x = e.clientX - rect.left, y = e.clientY - rect.top; var col = Math.floor((x - 32) / 32), row = Math.floor((y - 32) / 32); if (row >= 0 && row < rows && col >= 0 && col < cols && !revealed[row][col]) { flags++; } };
        document.onkeydown = function(e) { if (e.keyCode === 82) init(); };
        init();
    }
